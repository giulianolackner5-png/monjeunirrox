<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirrox Minecraft 2D</title>
    
    <!-- Code corrigé : Ton image est maintenant l'icône officielle pour ton Chromebook -->
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Nirrox%20Minecraft%22,%22short_name%22:%22Minecraft2D%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23facc56%22,%22icons%22:[{%22src%22:%22https://googleusercontent.com}]}">

    <style>
        body { background: #1a1a1a; color: white; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 0; overflow: hidden; }
        
        /* Style du menu d'accueil */
        #menu { 
            position: absolute; width: 100%; height: 100vh; background: #facc56; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        #logo { width: 300px; height: 300px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .btn-jouer { background: #1a5135; color: white; border: none; padding: 15px 40px; font-size: 24px; font-weight: bold; border-radius: 10px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn-jouer:active { transform: scale(0.95); }

        /* Interface du jeu */
        #jeu-container { display: none; margin-top: 10px; }
        canvas { background: #74b9ff; border: 4px solid #1a5135; display: block; margin: 10px auto; }
        #infos { font-size: 18px; color: #facc56; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

    <!-- LE MENU DE DÉMARRAGE -->
    <div id="menu">
        <img id="logo" src="https://googleusercontent.com" alt="Logo Nirrox Chanel">
        <button class="btn-jouer" onclick="demarrerJeu()">JOUER</button>
    </div>

    <!-- LE JEU -->
    <div id="jeu-container">
        <div id="infos">Bloc sélectionné : <span id="bloc-actif">TERRE</span> | [Espace] pour changer | Clic pour casser/poser</div>
        <canvas id="monde" width="800" height="500"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("monde");
        const ctx = canvas.getContext("2d");

        const TAILLE_BLOC = 25;
        const COLONNES = canvas.width / TAILLE_BLOC;
        const LIGNES = canvas.height / TAILLE_BLOC;

        const COULEURS = {
            0: "#74b9ff", // CIEL
            1: "#2ecc71", // HERBE
            2: "#87572b", // TERRE
            3: "#7f8c8d"  // PIERRE
        };

        const NOM_BLOCS = ["AIR", "HERBE", "TERRE", "PIERRE"];

        let grille = [];
        let joueur = { x: 400, y: 100, largeur: 20, hauteur: 22, vitesse: 4, velY: 0, auSol: false };
        let blocSelectionne = 2;
        let touches = {};

        function demarrerJeu() {
            document.getElementById("menu").style.display = "none";
            document.getElementById("jeu-container").style.display = "block";
            genererMonde();
            boucleJeu();
        }

        function genererMonde() {
            for (let y = 0; y < LIGNES; y++) {
                grille[y] = [];
                for (let x = 0; x < COLONNES; x++) {
                    if (y < 10) {
                        grille[y][x] = 0;
                    } else if (y === 10) {
                        grille[y][x] = 1;
                    } else if (y > 10 && y < 15) {
                        grille[y][x] = 2;
                    } else {
                        grille[y][x] = 3;
                    }
                }
            }
        }

        window.addEventListener("keydown", (e) => {
            touches[e.key] = true;
            if (e.key === " ") {
                blocSelectionne++;
                if (blocSelectionne > 3) blocSelectionne = 1;
                document.getElementById("bloc-actif").innerText = NOM_BLOCS[blocSelectionne];
            }
        });
        window.addEventListener("keyup", (e) => touches[e.key] = false);

        canvas.addEventListener("mousedown", (e) => {
            const rect = canvas.getBoundingClientRect();
            const clicX = e.clientX - rect.left;
            const clicY = e.clientY - rect.top;

            const caseX = Math.floor(clicX / TAILLE_BLOC);
            const caseY = Math.floor(clicY / TAILLE_BLOC);

            if (caseX >= 0 && caseX < COLONNES && caseY >= 0 && caseY < LIGNES) {
                if (grille[caseY][caseX] === 0) {
                    grille[caseY][caseX] = blocSelectionne;
                } else {
                    grille[caseY][caseX] = 0;
                }
            }
        });

        function mettreAJour() {
            if (touches["ArrowLeft"] || touches["q"]) joueur.x -= joueur.vitesse;
            if (touches["ArrowRight"] || touches["d"]) joueur.x += joueur.vitesse;

            joueur.velY += 0.5;
            joueur.y += joueur.velY;
            joueur.auSol = false;

            let piedY = Math.floor((joueur.y + joueur.hauteur) / TAILLE_BLOC);
            let centreX = Math.floor((joueur.x + joueur.largeur / 2) / TAILLE_BLOC);

            if (piedY >= 0 && piedY < LIGNES && centreX >= 0 && centreX < COLONNES) {
                if (grille[piedY][centreX] !== 0) {
                    joueur.y = (piedY * TAILLE_BLOC) - joueur.hauteur;
                    joueur.velY = 0;
                    joueur.auSol = true;
                }
            }

            if ((touches["ArrowUp"] || touches["z"]) && joueur.auSol) {
                joueur.velY = -8;
                joueur.auSol = false;
            }

            if (joueur.x < 0) joueur.x = 0;
            if (joueur.x > canvas.width - joueur.largeur) joueur.x = canvas.width - joueur.largeur;
        }

        function dessiner() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < LIGNES; y++) {
                for (let x = 0; x < COLONNES; x++) {
                    ctx.fillStyle = COULEURS[grille[y][x]];
                    ctx.fillRect(x * TAILLE_BLOC, y * TAILLE_BLOC, TAILLE_BLOC, TAILLE_BLOC);
                    if (grille[y][x] !== 0) {
                        ctx.strokeStyle = "rgba(0,0,0,0.05)";
                        ctx.strokeRect(x * TAILLE_BLOC, y * TAILLE_BLOC, TAILLE_BLOC, TAILLE_BLOC);
                    }
                }
            }

            ctx.fillStyle = "#e67e22";
            ctx.fillRect(joueur.x, joueur.y, joueur.largeur, joueur.hauteur);
            ctx.fillStyle = "#16a085";
            ctx.fillRect(joueur.x + 12, joueur.y + 4, 5, 5);
        }

        function boucleJeu() {
            mettreAJour();
            dessiner();
            requestAnimationFrame(boucleJeu);
        }

        if ('serviceWorker' in navigator) {
            const codeSW = 'self.addEventListener("fetch", (e) => {});';
            const blob = new Blob([codeSW], { type: 'text/javascript' });
            const urlSW = URL.createObjectURL(blob);
            navigator.serviceWorker.register(urlSW);
        }
    </script>
</body>
</html>
