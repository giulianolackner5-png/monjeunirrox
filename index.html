<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Jeu Installable</title>
    
    <!-- Le Manifest intégré pour activer le bouton installer -->
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Mon%20Super%20Jeu%22,%22short_name%22:%22Jeu%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23111%22,%22icons%22:[{%22src%22:%22data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='192' height='192'><rect width='192' height='192' rx='40' fill='%2300ff88'/><circle cx='96' cy='96' r='40' fill='black'/></svg>%22,%22sizes%22:%22192x192%22,%22type%22:%22image/svg+xml%22},{%22src%22:%22data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='512' height='512'><rect width='512' height='512' rx='100' fill='%2300ff88'/><circle cx='256' cy='256' r='100' fill='black'/></svg>%22,%22sizes%22:%22512x512%22,%22type%22:%22image/svg+xml%22}]}">

    <style>
        body { background: #111; color: #00ff88; font-family: monospace; text-align: center; padding-top: 100px; }
        button { background: #00ff88; color: black; border: none; padding: 20px 40px; font-size: 22px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <h1>JEU DE CLIC</h1>
    <h2 id="score">SCORE : 0</h2>
    <button onclick="ajouter()">CLIQUER</button>

    <script>
        // Le code du jeu
        let score = 0;
        function ajouter() {
            score++;
            document.getElementById('score').innerText = "SCORE : " + score;
        }

        // Le script obligatoire pour forcer l'apparition du bouton installer
        if ('serviceWorker' in navigator) {
            const codeSW = 'self.addEventListener("fetch", (e) => {});';
            const blob = new Blob([codeSW], { type: 'text/javascript' });
            const urlSW = URL.createObjectURL(blob);
            navigator.serviceWorker.register(urlSW);
        }
    </script>
</body>
</html>
