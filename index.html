<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nirrox Craft World</title>
    
    <!-- Code de l'icône Chromebook réparé avec ton logo intégré en texte sécurisé -->
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22Nirrox%20Craft%20World%22,%22short_name%22:%22NirroxCraft%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23facc56%22,%22icons%22:[{%22src%22:%22data:image/svg+xml;utf8,<svg xmlns='http://w3.org' width='192' height='192' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23facc56'/><text x='50' y='65' font-family='sans-serif' font-size='32' font-weight='bold' fill='%231a5135' text-anchor='middle'>NC</text></svg>%22,%22sizes%22:%22192x192%22,%22type%22:%22image/svg+xml%22}]}">

    <style>
        body { background: #111; color: white; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 0; overflow: hidden; user-select: none; }
        
        /* Menu d'accueil réparé avec fond jaune */
        #menu { 
            position: absolute; width: 100%; height: 100vh; background: #facc56; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10;
        }
        #logo-box { width: 280px; height: 280px; background: #facc56; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .logo-text-1 { font-size: 42px; font-weight: bold; color: #1a5135; margin: 0; }
        .logo-text-2 { font-size: 38px; font-weight: bold; color: #1a5135; margin: 0; letter-spacing: 2px; }
        .crown { font-size: 50px; margin-bottom: -10px; color: #b38f00; }
        
        .btn-jouer { background: #1a5135; color: white; border: none; padding: 15px 50px; font-size: 24px; font-weight: bold; border-radius: 30px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.2s; }
        .btn-jouer:hover { background: #24754d; }

        /* Jeu */
        #jeu-container { display: none; margin-top: 5px; }
        canvas { background: #54a0ff; border: 4px solid #1a5135; display: block; margin: 0 auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #barre-outils { font-size: 16px; color: #facc56; margin-bottom: 5px; background: #222; padding: 5px; }
        .active-item { color: #fff; background: #1a5135; padding: 2px 8px; border-radius: 3px; }
    </style>
</head>
<body>

    <!-- MENU PRINCIPAL NIRROX CHANEL -->
    <div id="menu">
        <div id="logo-box">
            <div class="crown">👑</div>
            <p class="logo-text-1">NiRROX</p>
            <p class="logo-text-2">CHANEL</p>
        </div>
        <button class="btn-jouer" onclick="demarrerJeu()">JOUER À NIRROX CRAFT</button>
    </div>

    <!-- ZONE DE JEU -->
    <div id="jeu-container">
        <div id="barre-outils">
            [A] Pioche | [Z] Bloc d'Herbe | [E] Bloc de Pierre | Action : <span id="outil-actif" class="active-item">PIOCHE (MINER)</span>
        </div>
        <canvas id="monde" width="900" height="525"></canvas>
    </div>

    <script>
        const canvas = document.getElementById("monde");
        const ctx = canvas.getContext("2d");

        const TILE = 25;
        const COLS = canvas.width / TILE;
        const ROWS = canvas.height / TILE;

        // Blocs originaux de Nirrox Craft
        const BLOCS = { 0: "#54a0ff", 1: "#10ac84", 2: "#576574", 3: "#222f3e" };
        const TEXTES = { 0: "AIR", 1: "HERBE", 2: "PIERRE", 3: "FOND" };
        
        let map = [];
        let joueur = { x: 450, y: 100, w: 18, h: 24, vX: 0, vY: 0, auSol: false, vitesse: 4 };
        let mode = "pioche"; 
        let blocChoisi = 1;
        let touches = {};

        function demarrerJeu() {
            document.getElementById("menu").style.display = "none";
            document.getElementById("jeu-container").style.display = "block";
            creerTerrain();
            setInterval(run, 1000/60);
        }

        function creerTerrain() {
            for (let y = 0; y < ROWS; y++) {
                map[y] = [];
                for (let x = 0; x < COLS; x++) {
                    if (y < 12) map[y][x] = 0;
                    else if (y === 12) map[y][x] = 1;
                    else map[y][x] = 2;
                }
            }
        }

        window.addEventListener("keydown", (e) => {
            touches[e.key.toLowerCase()] = true;
            if (e.key.toLowerCase() === "a") { mode = "pioche"; majInterface(); }
            if (e.key.toLowerCase() === "z") { mode = "pose"; blocChoisi = 1; majInterface(); }
            if (e.key.toLowerCase() === "e") { mode = "pose"; blocChoisi = 2; majInterface(); }
        });
        window.addEventListener("keyup", (e) => touches[e.key.toLowerCase()] = false);

        function majInterface() {
            let txt = mode === "pioche" ? "PIOCHE (MINER)" : "POSER (" + TEXTES[blocChoisi] + ")";
            document.getElementById("outil-actif").innerText = txt;
        }

        canvas.addEventListener("mousedown", (e) => {
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;
            const c = Math.floor(clickX / TILE);
            const r = Math.floor(clickY / TILE);

            if (c >= 0 && c < COLS && r >= 0 && r < ROWS) {
                if (mode === "pioche") map[r][c] = 0;
                else if (mode === "pose" && map[r][c] === 0) map[r][c] = blocChoisi;
            }
        });

        function update() {
            if (touches["arrowleft"] || touches["q"]) joueur.vX = -joueur.vitesse;
            else if (touches["arrowright"] || touches["d"]) joueur.vX = joueur.vitesse;
            else joueur.vX = 0;

            joueur.vY += 0.4; // Gravité terraria
            joueur.x += joueur.vX;
            joueur.y += joueur.vY;
            joueur.auSol = false;

            let checkR = Math.floor((joueur.y + joueur.h) / TILE);
            let checkC = Math.floor((joueur.x + joueur.w/2) / TILE);

            if (checkR >= 0 && checkR < ROWS && checkC >= 0 && checkC < COLS) {
                if (map[checkR][checkC] !== 0) {
                    joueur.y = (checkR * TILE) - joueur.h;
                    joueur.vY = 0;
                    joueur.auSol = true;
                }
            }

            if ((touches["arrowup"] || touches["z"]) && joueur.auSol) {
                joueur.vY = -7.5;
                joueur.auSol = false;
            }

            if (joueur.x < 0) joueur.x = 0;
            if (joueur.x > canvas.width - joueur.w) joueur.x = canvas.width - joueur.w;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    ctx.fillStyle = BLOCS[map[y][x]];
                    ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
                    if (map[y][x] !== 0) {
                        ctx.strokeStyle = "rgba(0,0,0,0.1)";
                        ctx.strokeRect(x * TILE, y * TILE, TILE, TILE);
                    }
                }
            }
            ctx.fillStyle = "#ff7675"; // Joueur
            ctx.fillRect(joueur.x, joueur.y, joueur.w, joueur.h);
        }

        function run() { update(); draw(); }

        if ('serviceWorker' in navigator) {
            const codeSW = 'self.addEventListener("fetch", (e) => {});';
            const blob = new Blob([codeSW], { type: 'text/javascript' });
            const urlSW = URL.createObjectURL(blob);
            navigator.serviceWorker.register(urlSW);
        }
    </script>
</body>
</html>
